<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings</title>
    <script type="module" defer src="./script.js"></script>
    <link rel="icon" href="./images/icons8-linkedin-100.png" />
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="py-50px text-small">
    <div>
      <header
        class="w-full h-50px flex items-center bg-white border-b border-separator-line fixed top-0 z-999"
      >
        <div class="h-3/5 w-50px">
          <a href="./">
            <img
              class="h-full aspect-square block justify-self-center"
              src="./images/icons8-profile-100.png"
            />
          </a>
        </div>
        <div
          class="basis-[calc(100%-100px)] h-3/5 bg-[#edf3f8] flex items-center"
        >
          <img
            class="h-3/5 aspect-square ml-10px"
            src="./images/icons8-search-100.png"
          />
          <input
            type="text"
            name="search"
            class="font-bold pl-5px pr-10px outline-none pt-[4px] text-medium"
            placeholder="Search"
          />
        </div>
        <div class="h-3/5 w-50px">
          <a href="./message.html" class="relative">
            <img
              class="h-full aspect-square block justify-self-center"
              src="./images/icons8-chat-bubble-100.png"
            />
            <img
              src="./images/icons8-circled-1-100.png"
              class="w-sm-noti-bubble h-sm-noti-bubble border border-double rounded-full border-white absolute top-0 right-[2px]"
            />
          </a>
        </div>
      </header>
    </div>

    <footer
      class="fixed z-999 bottom-0 h-50px w-full bg-white border-t border-separator-line"
    >
      <nav class="w-full h-full">
        <ul class="flex w-full h-full items-center justify-center">
          <li class="text-center basis-1/5 min-w-1/5 relative">
            <a
              href="#"
              class="w-full flex flex-col items-center justify-center text-ext-small text-primary-tx"
            >
              <img
                src="./images/icons8-home-100.png"
                class="w-sm-img h-sm-img align-middle"
              />
              <p class="">Home</p>
              <img
                src="./images/icons8-circle-100.png"
                class="w-sm-noti-bubble h-sm-noti-bubble absolute top-0 right-10px"
              />
            </a>
          </li>
          <li class="text-center basis-1/5 min-w-1/5 relative">
            <a
              href="#"
              class="w-full flex flex-col items-center justify-center text-ext-small text-primary-tx"
            >
              <img
                src="./images/icons8-people-48.png"
                class="w-sm-img h-sm-img align-middle"
              />
              <p class="">My Network</p>
              <img
                src="./images/icons8-circled-1-100.png"
                class="w-sm-noti-bubble h-sm-noti-bubble absolute top-0 right-10px"
              />
            </a>
          </li>
          <li class="text-center basis-1/5 min-w-1/5">
            <a
              href="#"
              class="w-full flex flex-col items-center justify-center text-ext-small text-primary-tx"
            >
              <img
                src="./images/icons8-plus-key-100.png"
                class="w-sm-img h-sm-img align-middle"
              />
              <p class="">Post</p>
            </a>
          </li>
          <li class="text-center basis-1/5 min-w-1/5 relative">
            <a
              href="#"
              class="w-full flex flex-col items-center justify-center text-ext-small text-primary-tx"
            >
              <img
                src="./images/icons8-doorbell-100.png"
                class="w-sm-img h-sm-img align-middle"
              />
              <p class="">Notifications</p>
              <img
                src="./images/icons8-circled-5-100.png"
                class="w-sm-noti-bubble h-sm-noti-bubble absolute top-0 right-10px"
              />
            </a>
          </li>
          <li class="text-center basis-1/5 min-w-1/5">
            <a
              href="#"
              class="w-full flex flex-col items-center justify-center text-ext-small text-primary-tx"
            >
              <img
                src="./images/icons8-bag-100.png"
                class="w-sm-img h-sm-img align-middle"
              />
              <p class="">Jobs</p>
            </a>
          </li>
        </ul>
      </nav>
    </footer>
